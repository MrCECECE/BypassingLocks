port: 7890
socks-port: 7891
allow-lan: true
mode: rule
log-level: info

proxies:
  - name: "Home"
    type: socks5
    server: 192.168.1.68
    port: 7891
    udp: true

proxy-groups:
  - name: "SWITCH"
    type: select
    proxies:
      - "Home"
      - "DIRECT"

rules:
  - DOMAIN-SUFFIX,ru,DIRECT
  - DOMAIN-SUFFIX,рф,DIRECT
  - IP-CIDR,5.255.255.0/24,DIRECT,no-resolve
  - IP-CIDR,77.88.0.0/18,DIRECT,no-resolve
  - IP-CIDR,87.250.250.0/24,DIRECT,no-resolve
  - IP-CIDR,90.156.201.0/24,DIRECT,no-resolve
  - IP-CIDR,93.158.134.0/24,DIRECT,no-resolve
  - IP-CIDR,95.108.128.0/17,DIRECT,no-resolve
  - IP-CIDR,109.252.0.0/16,DIRECT,no-resolve
  - IP-CIDR,178.154.0.0/15,DIRECT,no-resolve
  - IP-CIDR,185.22.0.0/17,DIRECT,no-resolve
  - IP-CIDR,194.186.0.0/16,DIRECT,no-resolve
  - IP-CIDR,213.180.193.0/24,DIRECT,no-resolve
  - IP-CIDR,213.180.204.0/24,DIRECT,no-resolve
  - IP-CIDR,217.69.128.0/20,DIRECT,no-resolve
