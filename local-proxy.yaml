port: 7890
socks-port: 7891
allow-lan: true
mode: rule
log-level: info

proxies:
  - name: "Home"
    type: http
    server: 192.168.1.73
    port: 10810

proxy-groups:
  - name: "SWITCH"
    type: select
    proxies:
      - "Home"
      - "DIRECT"

rules:
  - IP-CIDR,192.168.0.0/16,DIRECT,no-resolve
  - IP-CIDR,10.0.0.0/8,DIRECT,no-resolve
  - IP-CIDR,172.16.0.0/12,DIRECT,no-resolve

  - DOMAIN-SUFFIX,ru,DIRECT
  - DOMAIN-SUFFIX,рф,DIRECT

  - MATCH,SWITCH
